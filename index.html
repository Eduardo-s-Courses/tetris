<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1 class="game-title">TETRIS</h1>
  <div class="wrapper">
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>

        <div class="panel-section">
          <label class="theme-toggle" title="Cambiar tema">
            <span class="label">MODO CLARO</span>
            <span class="toggle-switch">
              <input type="checkbox" id="theme-toggle" />
              <span class="toggle-track"></span>
            </span>
          </label>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>

    <div id="pause-menu" class="overlay hidden">
      <div class="overlay-box menu-box">
        <p id="menu-title">PAUSA</p>

        <div class="menu-actions">
          <button id="resume-btn">Reanudar</button>
          <button id="menu-restart-btn">Reiniciar</button>
          <button id="controls-btn">Ver controles</button>
        </div>

        <div id="menu-controls" class="menu-controls hidden">
          <span class="label">CONTROLES</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd><kbd>Esc</kbd> pausa</li>
          </ul>
        </div>

        <div class="menu-level">
          <label class="label" for="start-level">NIVEL INICIAL</label>
          <select id="start-level"></select>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
